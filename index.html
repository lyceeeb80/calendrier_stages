<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendrier Interactif PFMP - Blocs Continus</title>
    <style>
        :root {
            --bg-color: #f4f0eb;
            --text-color: #000000;
            --border-color: #000000;
            --card-bg: #ffffff;
            --header-bg: #e8e8e8;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Conteneur de l'en-tête et Logo --- */
        .header-container {
            position: relative;
            width: 100%;
            max-width: 1400px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 0;
            text-align: center;
        }

        .logo-top-left {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            max-height: 80px;
            width: auto;
        }

        .container {
            display: flex;
            gap: 30px;
            max-width: 1400px;
            width: 100%;
            align-items: flex-start;
        }

        /* --- Panneau des calques (Filtres) --- */
        .filters {
            flex: 1;
            min-width: 220px;
            background: var(--card-bg);
            border: 3px solid var(--border-color);
            border-radius: 0px;
            padding: 20px;
            box-shadow: 6px 6px 0px var(--border-color);
            position: sticky;
            top: 20px;
        }

        .filters h2 {
            margin-top: 0;
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            border-bottom: 3px solid var(--border-color);
            padding-bottom: 10px;
        }

        .filters-toggle-all {
            width: 100%;
            background: var(--header-bg);
            border: 3px solid var(--border-color);
            padding: 8px 10px;
            font-weight: 800;
            font-size: 0.8rem;
            text-transform: uppercase;
            cursor: pointer;
            margin-bottom: 16px;
            box-shadow: 3px 3px 0px var(--border-color);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .filters-toggle-all:active {
            transform: translate(3px, 3px);
            box-shadow: 0px 0px 0px var(--border-color);
        }

        .filter-label {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.95rem;
            text-transform: uppercase;
        }

        .filter-label input {
            margin-right: 12px;
            width: 22px;
            height: 22px;
            accent-color: var(--border-color);
            cursor: pointer;
            border: 2px solid var(--border-color);
        }

        /* --- Zone Calendrier --- */
        .calendar-wrapper {
            flex: 4;
            min-width: 700px;
            background: var(--card-bg);
            border: 3px solid var(--border-color);
            box-shadow: 6px 6px 0px var(--border-color);
            overflow: hidden;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background-color: var(--header-bg);
            border-bottom: 3px solid var(--border-color);
        }

        .calendar-header button {
            background: #fff;
            border: 3px solid var(--border-color);
            padding: 8px 16px;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 3px 3px 0px var(--border-color);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .calendar-header button:active {
            transform: translate(3px, 3px);
            box-shadow: 0px 0px 0px var(--border-color);
        }

        .calendar-header h2 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 900;
            text-transform: uppercase;
        }

        /* --- Sélecteur de vue (Mois / Année) --- */
        .view-toggle {
            display: flex;
            border: 3px solid var(--border-color);
            box-shadow: 3px 3px 0px var(--border-color);
            overflow: hidden;
        }

        .view-toggle button {
            background: #fff;
            border: none;
            padding: 8px 16px;
            font-weight: 800;
            font-size: 0.95rem;
            text-transform: uppercase;
            cursor: pointer;
            color: var(--text-color);
        }

        .view-toggle button:not(:last-child) {
            border-right: 3px solid var(--border-color);
        }

        .view-toggle button.active {
            background-color: #2196F3;
            color: #fff;
        }

        /* --- Grille des jours --- */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }

        #days-header {
            border-bottom: 3px solid var(--border-color);
        }

        .day-name {
            font-weight: 900;
            text-align: center;
            padding: 12px 0;
            background-color: var(--header-bg);
            border-right: 3px solid var(--border-color);
            text-transform: uppercase;
        }

        .day-name:last-child {
            border-right: none;
        }

        .day-box {
            min-height: 140px;
            border-right: 3px solid var(--border-color);
            border-bottom: 3px solid var(--border-color);
            background-color: #fff;
            display: flex;
            flex-direction: column;
            padding-top: 30px;
            position: relative;
        }

        .day-box:nth-child(7n) {
            border-right: none;
        }

        .day-box.empty {
            background-color: #f0f0f0;
            background-image: repeating-linear-gradient(45deg, #e0e0e0 0, #e0e0e0 2px, transparent 2px, transparent 8px);
        }

        .date-number {
            font-weight: 900;
            font-size: 1.2rem;
            position: absolute;
            top: 5px;
            right: 8px;
            color: #111;
        }

        /* --- Blocs continus des stages --- */
        .event-bar {
            height: 24px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            font-size: 0.75rem;
            font-weight: 800;
            color: #000;
            overflow: hidden;
            white-space: nowrap;
            border-top: 2px solid var(--border-color);
            border-bottom: 2px solid var(--border-color);
        }

        .event-start {
            margin-left: 5px;
            border-left: 2px solid var(--border-color);
            border-top-left-radius: 6px;
            border-bottom-left-radius: 6px;
            padding-left: 8px;
        }

        .event-middle {
            border-left: none;
            border-right: none;
        }

        .event-end {
            margin-right: 5px;
            border-right: 2px solid var(--border-color);
            border-top-right-radius: 6px;
            border-bottom-right-radius: 6px;
        }

        .event-text {
            padding-left: 8px;
        }

        /* --- Vue Annuelle (frise Gantt zoomable) --- */
        .year-view {
            display: flex;
            flex-direction: column;
        }

        .year-scroll-area {
            overflow-x: auto;
            overflow-y: hidden;
        }

        .year-inner {
            display: flex;
            flex-direction: column;
            width: max-content;
            min-width: 100%;
        }

        .year-months-header {
            display: flex;
            border-bottom: 3px solid var(--border-color);
            background-color: var(--header-bg);
            position: sticky;
            top: 0;
            z-index: 3;
        }

        .year-corner-cell {
            flex: 0 0 200px;
            padding: 10px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.85rem;
            border-right: 3px solid var(--border-color);
            position: sticky;
            left: 0;
            background-color: var(--header-bg);
            z-index: 4;
        }

        .year-months-track {
            flex: 1 1 auto;
            display: flex;
            position: relative;
        }

        .year-month-name {
            flex: 1 1 0;
            padding: 10px 4px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.8rem;
            text-align: center;
            border-right: 1px solid #ccc;
        }

        .year-month-name:last-child {
            border-right: none;
        }

        .year-row {
            display: flex;
            border-bottom: 1px solid #ddd;
            min-height: 38px;
            align-items: center;
        }

        .year-row:last-child {
            border-bottom: 3px solid var(--border-color);
        }

        .year-row:nth-child(even) {
            background-color: #fafafa;
        }

        .year-row-label {
            flex: 0 0 200px;
            padding: 8px 12px;
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            border-right: 3px solid var(--border-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 8px;
            position: sticky;
            left: 0;
            background-color: inherit;
            z-index: 2;
        }

        .year-row-swatch {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
            border: 2px solid var(--border-color);
        }

        .year-row-track {
            position: relative;
            flex: 1 1 auto;
            height: 26px;
            display: flex;
        }

        .year-month-cell {
            flex: 1 1 0;
            border-right: 1px solid #eee;
            height: 100%;
        }

        .year-month-cell:last-child {
            border-right: none;
        }

        .year-event-bar {
            position: absolute;
            top: 2px;
            height: 22px;
            border-top: 2px solid var(--border-color);
            border-bottom: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            font-size: 0.7rem;
            font-weight: 800;
            color: #000;
            white-space: nowrap;
            overflow: hidden;
            cursor: pointer;
        }

        .year-event-bar.event-start {
            border-left: 2px solid var(--border-color);
            border-top-left-radius: 6px;
            border-bottom-left-radius: 6px;
        }

        .year-event-bar.event-end {
            border-right: 2px solid var(--border-color);
            border-top-right-radius: 6px;
            border-bottom-right-radius: 6px;
        }

        .year-event-bar .event-text {
            padding-left: 6px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .year-today-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background-color: #e91e63;
            z-index: 2;
        }

        /* --- Barre de zoom horizontale (style timeline) --- */
        .zoom-bar {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            background-color: var(--header-bg);
            border-top: 3px solid var(--border-color);
        }

        .zoom-bar-icon {
            font-weight: 900;
            font-size: 0.9rem;
            user-select: none;
            flex-shrink: 0;
        }

        .zoom-bar-icon.small {
            font-size: 0.7rem;
        }

        .zoom-slider-track {
            position: relative;
            flex: 1 1 auto;
            height: 10px;
            background-color: #fff;
            border: 2px solid var(--border-color);
            cursor: pointer;
        }

        .zoom-slider-fill {
            position: absolute;
            top: -2px;
            bottom: -2px;
            left: 0;
            background-color: #2196F3;
            border-right: 2px solid var(--border-color);
            pointer-events: none;
        }

        .zoom-slider-handle {
            position: absolute;
            top: 50%;
            width: 18px;
            height: 26px;
            background-color: #fff;
            border: 3px solid var(--border-color);
            transform: translate(-50%, -50%);
            cursor: grab;
            box-shadow: 2px 2px 0px var(--border-color);
        }

        .zoom-slider-handle:active {
            cursor: grabbing;
        }

        .zoom-percent {
            font-weight: 800;
            font-size: 0.85rem;
            flex-shrink: 0;
            width: 48px;
            text-align: right;
        }

        .zoom-reset-btn {
            background: #fff;
            border: 3px solid var(--border-color);
            padding: 6px 12px;
            font-weight: 800;
            font-size: 0.75rem;
            text-transform: uppercase;
            cursor: pointer;
            flex-shrink: 0;
            box-shadow: 2px 2px 0px var(--border-color);
        }

        .zoom-reset-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--border-color);
        }

        /* Palette de couleurs */
        .color-0 { background-color: #FF5252; }
        .color-1 { background-color: #448AFF; }
        .color-2 { background-color: #FFEB3B; }
        .color-3 { background-color: #69F0AE; }
        .color-4 { background-color: #E040FB; }
        .color-5 { background-color: #FF9800; }
        .color-6 { background-color: #18FFFF; }
        .color-7 { background-color: #F48FB1; }

        @media (max-width: 1000px) {
            .container { flex-direction: column; }
            .calendar-wrapper { min-width: 100%; }
            .header-container {
                flex-direction: column;
            }
            .logo-top-left {
                position: relative;
                top: 0;
                transform: none;
                margin-bottom: 15px;
            }
            .calendar-header {
                flex-wrap: wrap;
                gap: 12px;
            }
            .year-corner-cell,
            .year-row-label {
                flex: 0 0 130px;
            }
            .zoom-bar {
                padding: 12px 14px;
            }
            .zoom-bar-icon {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <img src="cropped-cropped-hbjb.png" alt="Logo" class="logo-top-left">
        <h1>Planning de PFMP 2026-2027</h1>
    </div>

    <div class="container">
        <div class="filters">
            <h2>Formations</h2>
            <button id="toggle-all-filters" class="filters-toggle-all">Tout décocher</button>
            <div id="filter-container">
                </div>
        </div>

        <div class="calendar-wrapper">
            <div class="calendar-header">
                <button id="prev-month">&laquo; Précédent</button>
                <h2 id="month-display">Septembre 2026</h2>
                <div class="view-toggle">
                    <button id="view-month" class="active">Mois</button>
                    <button id="view-year">Année</button>
                </div>
                <button id="next-month">Suivant &raquo;</button>
            </div>
            
            <div class="calendar-grid" id="days-header">
                <div class="day-name">Lun</div>
                <div class="day-name">Mar</div>
                <div class="day-name">Mer</div>
                <div class="day-name">Jeu</div>
                <div class="day-name">Ven</div>
                <div class="day-name">Sam</div>
                <div class="day-name">Dim</div>
            </div>

            <div class="calendar-grid" id="calendar-grid"></div>
            <div class="year-view" id="year-view" style="display:none;">
                <div class="year-scroll-area" id="year-scroll-area">
                    <div class="year-inner" id="year-inner">
                        <div class="year-months-header" id="year-months-header"></div>
                        <div id="year-rows"></div>
                    </div>
                </div>
                <div class="zoom-bar">
                    <span class="zoom-bar-icon small">&#9651;</span>
                    <div class="zoom-slider-track" id="zoom-slider-track">
                        <div class="zoom-slider-fill" id="zoom-slider-fill"></div>
                        <div class="zoom-slider-handle" id="zoom-slider-handle"></div>
                    </div>
                    <span class="zoom-bar-icon">&#9651;&#9651;</span>
                    <span class="zoom-percent" id="zoom-percent">100%</span>
                    <button class="zoom-reset-btn" id="zoom-reset-btn">Réinitialiser</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let pfmpData = [];
        let classesArray = [];
        let classColors = {};

        let currentDate = new Date(2026, 8, 1);
        let currentView = 'month'; // 'month' ou 'year'

        // 1. Récupération du fichier JSON externe
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                pfmpData = data;
                initialiserApplication();
            })
            .catch(error => {
                console.error("Erreur lors du chargement de data.json :", error);
                document.getElementById('calendar-grid').innerHTML = "<p style='padding:20px; font-weight:bold; color:red;'>Erreur : Impossible de charger les données. Vérifiez que le fichier data.json est bien présent à côté du fichier HTML.</p>";
            });

        // 2. Initialisation une fois les données chargées
        function initialiserApplication() {
            const allClasses = new Set();
            pfmpData.forEach(entry => allClasses.add(entry.classe.trim()));
            classesArray = Array.from(allClasses).sort();

            classesArray.forEach((className, index) => {
                classColors[className] = `color-${index % 8}`;
            });

            const filterContainer = document.getElementById('filter-container');
            filterContainer.innerHTML = ''; // Nettoyer au cas où
            classesArray.forEach(className => {
                const label = document.createElement('label');
                label.className = 'filter-label';
                label.innerHTML = `<input type="checkbox" value="${className}" checked> ${className}`;
                filterContainer.appendChild(label);
            });

            // Ajouter les écouteurs d'événements sur les nouveaux filtres
            document.querySelectorAll('.filter-label input').forEach(checkbox => {
                checkbox.addEventListener('change', () => {
                    updateToggleAllLabel();
                    render();
                });
            });

            // Lancer le premier affichage
            render();
        }

        function dateToString(d) {
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function renderMonth() {
            const grid = document.getElementById('calendar-grid');
            const monthDisplay = document.getElementById('month-display');
            grid.innerHTML = '';

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            monthDisplay.textContent = new Intl.DateTimeFormat('fr-FR', { month: 'long', year: 'numeric' }).format(currentDate);

            const firstDayIndex = new Date(year, month, 1).getDay();
            const emptyDaysBefore = firstDayIndex === 0 ? 6 : firstDayIndex - 1; 
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            const activeClasses = Array.from(document.querySelectorAll('.filter-label input:checked')).map(cb => cb.value);

            for (let i = 0; i < emptyDaysBefore; i++) {
                const emptyBox = document.createElement('div');
                emptyBox.className = 'day-box empty';
                grid.appendChild(emptyBox);
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const currentDayDate = new Date(year, month, day);
                const currentDayStr = dateToString(currentDayDate);
                const dayOfWeek = currentDayDate.getDay();

                const dayBox = document.createElement('div');
                dayBox.className = 'day-box';
                
                const dateNumber = document.createElement('div');
                dateNumber.className = 'date-number';
                dateNumber.textContent = day;
                dayBox.appendChild(dateNumber);

                classesArray.forEach(className => {
                    if (!activeClasses.includes(className)) return;

                    const activeEvent = pfmpData.find(e => e.classe === className && currentDayStr >= e.debut && currentDayStr <= e.fin);

                    if (activeEvent) {
                        const isStart = currentDayStr === activeEvent.debut;
                        const isEnd = currentDayStr === activeEvent.fin;
                        const isMonday = dayOfWeek === 1; 
                        const showText = isStart || isMonday;

                        const eventBar = document.createElement('div');
                        eventBar.className = `event-bar ${classColors[className]}`;
                        
                        if (isStart) eventBar.classList.add('event-start');
                        else if (isEnd) eventBar.classList.add('event-end');
                        else eventBar.classList.add('event-middle');

                        if (showText) {
                            eventBar.innerHTML = `<span class="event-text">${className}</span>`;
                        }

                        dayBox.appendChild(eventBar);
                    }
                });

                grid.appendChild(dayBox);
            }

            const totalCells = emptyDaysBefore + daysInMonth;
            const emptyDaysAfter = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
            
            for (let i = 0; i < emptyDaysAfter; i++) {
                const emptyBox = document.createElement('div');
                emptyBox.className = 'day-box empty';
                grid.appendChild(emptyBox);
            }
        }

        const monthNamesShort = ['Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Jun', 'Jul', 'Aoû', 'Sep', 'Oct', 'Nov', 'Déc'];

        function isLeapYear(y) {
            return (y % 4 === 0 && y % 100 !== 0) || (y % 400 === 0);
        }

        function daysInYear(y) {
            return isLeapYear(y) ? 366 : 365;
        }

        function dayOfYearClipped(dateStr, year) {
            const d = new Date(dateStr + 'T00:00:00');
            if (d.getFullYear() < year) return 0;
            if (d.getFullYear() > year) return daysInYear(year);
            const start = new Date(year, 0, 1);
            return Math.round((d - start) / 86400000);
        }

        function renderYear() {
            const monthsHeader = document.getElementById('year-months-header');
            const rowsContainer = document.getElementById('year-rows');
            const monthDisplay = document.getElementById('month-display');
            const yearInner = document.getElementById('year-inner');
            monthsHeader.innerHTML = '';
            rowsContainer.innerHTML = '';

            const year = currentDate.getFullYear();
            monthDisplay.textContent = year;

            const activeClasses = Array.from(document.querySelectorAll('.filter-label input:checked')).map(cb => cb.value);
            const totalDays = daysInYear(year);

            const scrollAreaWidth = document.getElementById('year-scroll-area').clientWidth || 900;
            const labelWidth = window.innerWidth <= 1000 ? 130 : 200;
            const baseTrackWidth = Math.max(scrollAreaWidth - labelWidth, 300);
            const trackWidth = baseTrackWidth * yearZoom;
            yearInner.style.width = `${trackWidth + labelWidth}px`;

            const corner = document.createElement('div');
            corner.className = 'year-corner-cell';
            corner.textContent = 'Formation';
            monthsHeader.appendChild(corner);

            const monthsTrack = document.createElement('div');
            monthsTrack.className = 'year-months-track';

            monthNamesShort.forEach(name => {
                const cell = document.createElement('div');
                cell.className = 'year-month-name';
                cell.textContent = name;
                monthsTrack.appendChild(cell);
            });

            monthsHeader.appendChild(monthsTrack);

            const visibleClasses = classesArray.filter(c => activeClasses.includes(c));

            if (visibleClasses.length === 0) {
                const emptyRow = document.createElement('div');
                emptyRow.style.padding = '20px';
                emptyRow.style.fontWeight = '700';
                emptyRow.textContent = 'Aucune formation sélectionnée.';
                rowsContainer.appendChild(emptyRow);
                return;
            }

            visibleClasses.forEach(className => {
                const row = document.createElement('div');
                row.className = 'year-row';

                const label = document.createElement('div');
                label.className = 'year-row-label';
                label.title = className;

                const swatch = document.createElement('div');
                swatch.className = `year-row-swatch ${classColors[className]}`;
                label.appendChild(swatch);

                const labelText = document.createElement('span');
                labelText.textContent = className;
                label.appendChild(labelText);

                row.appendChild(label);

                const track = document.createElement('div');
                track.className = 'year-row-track';

                for (let m = 0; m < 12; m++) {
                    const cell = document.createElement('div');
                    cell.className = 'year-month-cell';
                    track.appendChild(cell);
                }

                const events = pfmpData.filter(e => e.classe === className);
                events.forEach(ev => {
                    const evStartYear = new Date(ev.debut + 'T00:00:00').getFullYear();
                    const evEndYear = new Date(ev.fin + 'T00:00:00').getFullYear();
                    if (evEndYear < year || evStartYear > year) return;

                    const startDay = dayOfYearClipped(ev.debut, year);
                    const endDay = dayOfYearClipped(ev.fin, year) + 1; 

                    const leftPct = (startDay / totalDays) * 100;
                    const widthPct = ((endDay - startDay) / totalDays) * 100;

                    const bar = document.createElement('div');
                    bar.className = `year-event-bar ${classColors[className]}`;
                    bar.style.left = `${leftPct}%`;
                    bar.style.width = `${widthPct}%`;
                    bar.title = `${className} : du ${ev.debut} au ${ev.fin}`;

                    const realStart = ev.debut >= `${year}-01-01` && ev.debut <= `${year}-12-31`;
                    const realEnd = ev.fin >= `${year}-01-01` && ev.fin <= `${year}-12-31`;
                    if (realStart) bar.classList.add('event-start');
                    if (realEnd) bar.classList.add('event-end');

                    const span = document.createElement('span');
                    span.className = 'event-text';
                    const formatCompact = (dateStr) => {
                        const d = new Date(dateStr + 'T00:00:00');
                        const dd = String(d.getDate()).padStart(2, '0');
                        const mm = String(d.getMonth() + 1).padStart(2, '0');
                        return `${dd}/${mm}`;
                    };
                    span.textContent = `${formatCompact(ev.debut)}→${formatCompact(ev.fin)}`;
                    bar.appendChild(span);

                    bar.addEventListener('click', () => {
                        currentDate = new Date(ev.debut + 'T00:00:00');
                        setView('month');
                    });

                    track.appendChild(bar);
                });

                row.appendChild(track);
                rowsContainer.appendChild(row);
            });

            const today = new Date();
            if (today.getFullYear() === year) {
                const todayDayNum = dayOfYearClipped(dateToString(today), year);
                const leftPct = (todayDayNum / totalDays) * 100;
                document.querySelectorAll('.year-row-track').forEach(track => {
                    const line = document.createElement('div');
                    line.className = 'year-today-line';
                    line.style.left = `${leftPct}%`;
                    line.title = "Aujourd'hui";
                    track.appendChild(line);
                });
            }
        }

        const ZOOM_MIN = 1;
        const ZOOM_MAX = 8; 
        let yearZoom = 1;

        function updateZoomUI() {
            const pct = Math.round((yearZoom - ZOOM_MIN) / (ZOOM_MAX - ZOOM_MIN) * 100);
            document.getElementById('zoom-slider-fill').style.width = `${pct}%`;
            document.getElementById('zoom-slider-handle').style.left = `${pct}%`;
            document.getElementById('zoom-percent').textContent = `${Math.round(yearZoom * 100)}%`;
        }

        function setYearZoom(newZoom, anchorRatio) {
            const scrollArea = document.getElementById('year-scroll-area');
            const prevScrollWidth = document.getElementById('year-inner').scrollWidth || 1;
            const ratio = anchorRatio !== undefined ? anchorRatio : (scrollArea.scrollLeft + scrollArea.clientWidth / 2) / prevScrollWidth;

            yearZoom = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, newZoom));
            updateZoomUI();
            renderYear();

            const newScrollWidth = document.getElementById('year-inner').scrollWidth || 1;
            scrollArea.scrollLeft = ratio * newScrollWidth - scrollArea.clientWidth / 2;
        }

        function initZoomBar() {
            const track = document.getElementById('zoom-slider-track');
            const handle = document.getElementById('zoom-slider-handle');

            function zoomFromClientX(clientX) {
                const rect = track.getBoundingClientRect();
                let pct = (clientX - rect.left) / rect.width;
                pct = Math.min(1, Math.max(0, pct));
                const newZoom = ZOOM_MIN + pct * (ZOOM_MAX - ZOOM_MIN);
                setYearZoom(newZoom);
            }

            track.addEventListener('click', (e) => {
                if (e.target === handle) return;
                zoomFromClientX(e.clientX);
            });

            let dragging = false;
            handle.addEventListener('mousedown', (e) => {
                dragging = true;
                e.preventDefault();
            });
            window.addEventListener('mousemove', (e) => {
                if (!dragging) return;
                zoomFromClientX(e.clientX);
            });
            window.addEventListener('mouseup', () => { dragging = false; });

            handle.addEventListener('touchstart', (e) => {
                dragging = true;
            }, { passive: true });
            window.addEventListener('touchmove', (e) => {
                if (!dragging) return;
                zoomFromClientX(e.touches[0].clientX);
            }, { passive: true });
            window.addEventListener('touchend', () => { dragging = false; });

            document.getElementById('zoom-reset-btn').addEventListener('click', () => {
                setYearZoom(1, 0);
                document.getElementById('year-scroll-area').scrollLeft = 0;
            });

            updateZoomUI();
        }

        function initWheelScroll() {
            const scrollArea = document.getElementById('year-scroll-area');
            scrollArea.addEventListener('wheel', (e) => {
                if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
                    e.preventDefault();
                    scrollArea.scrollLeft += e.deltaY;
                }
            }, { passive: false });
        }

        function render() {
            const monthGrid = document.getElementById('calendar-grid');
            const daysHeader = document.getElementById('days-header');
            const yearView = document.getElementById('year-view');

            if (currentView === 'month') {
                monthGrid.style.display = '';
                daysHeader.style.display = '';
                yearView.style.display = 'none';
                renderMonth();
            } else {
                monthGrid.style.display = 'none';
                daysHeader.style.display = 'none';
                yearView.style.display = '';
                renderYear();
            }
        }

        function setView(view) {
            currentView = view;
            document.getElementById('view-month').classList.toggle('active', view === 'month');
            document.getElementById('view-year').classList.toggle('active', view === 'year');
            render();
        }

        const toggleAllBtn = document.getElementById('toggle-all-filters');

        function updateToggleAllLabel() {
            const allChecked = Array.from(document.querySelectorAll('.filter-label input')).every(cb => cb.checked);
            toggleAllBtn.textContent = allChecked ? 'Tout décocher' : 'Tout cocher';
        }

        toggleAllBtn.addEventListener('click', () => {
            const allChecked = Array.from(document.querySelectorAll('.filter-label input')).every(cb => cb.checked);
            const newState = !allChecked;
            document.querySelectorAll('.filter-label input').forEach(cb => cb.checked = newState);
            updateToggleAllLabel();
            render();
        });

        document.getElementById('prev-month').addEventListener('click', () => {
            if (currentView === 'month') {
                currentDate.setMonth(currentDate.getMonth() - 1);
            } else {
                currentDate.setFullYear(currentDate.getFullYear() - 1);
            }
            render();
        });

        document.getElementById('next-month').addEventListener('click', () => {
            if (currentView === 'month') {
                currentDate.setMonth(currentDate.getMonth() + 1);
            } else {
                currentDate.setFullYear(currentDate.getFullYear() + 1);
            }
            render();
        });

        document.getElementById('view-month').addEventListener('click', () => setView('month'));
        document.getElementById('view-year').addEventListener('click', () => setView('year'));

        initZoomBar();
        initWheelScroll();

        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                if (currentView === 'year') renderYear();
            }, 150);
        });

    </script>
</body>
</html>
